# https://mise.jdx.dev/configuration.html
# Per-project overrides: create .mise.toml in any project directory

[tools]
# Userland Python via mise (3.14 series). Brew keeps python@3.13 as a formula
# dep for thefuck/liblqr — that's independent of the `python` command you
# invoke in a shell, which goes through mise shims.
node = "lts"
python = "3.14"
go = "latest"
ruby = "latest"

[settings]
# Also reads .nvmrc, .python-version, .tool-versions
idiomatic_version_file_enable_tools = ["node", "python", "ruby", "go"]
not_found_auto_install = true
jobs = 4
