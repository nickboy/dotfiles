name: Dotfiles CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN: nothing in this pipeline writes to the repo
permissions:
  contents: read

jobs:
  lint-all:
    name: Comprehensive Lint Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck libxml2-utils
          pip install yamllint
          npm install -g markdownlint-cli

      - name: Lint shell scripts (shebang-detected, includes extensionless)
        run: |
          echo "=== bash -n + ShellCheck over tracked bash/sh scripts ==="
          exit_code=0
          while IFS= read -r script; do
            if head -1 "$script" 2>/dev/null | \
               grep -qE '^#!/(usr/(local/)?)?bin/(env +)?(bash|sh)\b'; then
              echo "Checking: $script"
              bash -n "$script" || exit_code=1
              shellcheck -S warning "$script" || exit_code=1
            fi
          done < <(git ls-files)
          exit $exit_code

      - name: Lint YAML files
        run: |
          echo "=== YAML Lint ==="
          yamllint -d relaxed -f colored .

      - name: Lint Markdown files (blocking)
        run: |
          echo "=== Markdown Lint (tracked files, must pass) ==="
          git ls-files -z '*.md' | xargs -0 markdownlint

      - name: Validate plist templates (XML)
        run: |
          echo "=== Plist XML validation ==="
          while IFS= read -r plist; do
            echo "Checking: $plist"
            sed "s|{{HOME}}|/home/runner|g; s|{{env.HOME}}|/home/runner|g" \
              "$plist" | xmllint --noout -
          done < <(git ls-files '*plist*')

      - name: Universal file type validation
        run: |
          echo "=== Enhanced File Type Validation ==="

          # Install additional tools
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck
          pip install tomli

          # JSON validation
          echo "🔍 JSON Files:"
          find . -name "*.json" -type f ! -path "./.git/*" | \
            while read -r file; do
            echo "  Validating: $file"
            python -m json.tool "$file" >/dev/null
          done

          # TOML validation
          echo "🔍 TOML Files:"
          find . -name "*.toml" -type f ! -path "./.git/*" | \
            while read -r file; do
            echo "  Validating: $file"
            python -c "import tomli; tomli.load(open('$file', 'rb'))"
          done

          # Lua validation
          echo "🔍 Lua Files:"
          lua_pattern="*.lua"
          exclude_git="./.git/*"
          exclude_examples="*example*"
          # Exclude third-party plugin/flavor files managed by ya pkg
          exclude_third_party_plugins="./\.config/yazi/plugins/git.yazi/*"
          exclude_flavors="./\.config/yazi/flavors/*"
          if find . -name "$lua_pattern" -type f \
            ! -path "$exclude_git" ! -name "$exclude_examples" \
            ! -path "$exclude_third_party_plugins" \
            ! -path "$exclude_flavors" | grep -q .; then
            find . -name "$lua_pattern" -type f \
              ! -path "$exclude_git" ! -name "$exclude_examples" \
              ! -path "$exclude_third_party_plugins" \
              ! -path "$exclude_flavors" -print0 | \
              while IFS= read -r -d '' file; do
              echo "  Validating: $file"
              # Use Neovim-specific globals for config files
              if [[ "$file" == *"nvim"* ]]; then
                luacheck --globals vim require --std luajit "$file"
              elif [[ "$file" == *"yazi"* ]]; then
                luacheck --globals Status Linemode ya ui th fs Url Command Err ps rt cx --std luajit "$file"
              else
                luacheck "$file"
              fi
            done
          else
            echo "  No Lua files found (excluding examples)"
          fi

          # Brewfile validation
          if [ -f "Brewfile" ]; then
            echo "🔍 Brewfile:"
            grep -E '^(tap|brew|cask)\s+' Brewfile >/dev/null
            duplicates=$(grep -E '^(brew|cask)\s+' Brewfile | \
              sort | uniq -d | wc -l)
            [ "$duplicates" -eq 0 ]
          fi

      - name: Check file permissions
        run: |
          echo "=== File Permissions Check ==="
          # Check that shell scripts are executable
          for script in $(find . -name "*.sh" -type f); do
            if [ ! -x "$script" ]; then
              echo "Warning: $script is not executable"
            fi
          done

  documentation:
    name: Documentation Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check README exists
        run: |
          if [ ! -f README.md ]; then
            echo "ERROR: README.md not found"
            exit 1
          fi

      - name: Check for broken links in README
        uses: gaurav-nelson/github-action-markdown-link-check@499c1e7f3637c131334fa8e937c45144f79d72d2 # v1
        with:
          use-quiet-mode: 'yes'
          check-modified-files-only: 'yes'
        continue-on-error: true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Trivy stays advisory: filesystem CVE scanning is noisy for a
      # dotfiles repo. Pinned to a release SHA (was @master — a mutable
      # ref that would execute whatever upstream HEAD contains).
      - name: Run Trivy security scanner (advisory)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      # BLOCKING secret scan over the FULL git history (not a base..head
      # diff — the old diff mode failed with base==head on master pushes,
      # which is why it was continue-on-error, i.e. decorative).
      # --results=verified: only credentials that TruffleHog actively
      # confirmed against the provider fail the build (no regex noise).
      - name: Check for secrets (blocking)
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          extra_args: --results=verified

  macos-integration:
    name: macOS Integration + Test Suite
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache uv tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.local/share/uv
            ~/.local/bin
          key: uv-tools-${{ runner.os }}-beautysh-v1

      - name: Install validation tools
        run: |
          brew install uv zellij || true
          uv tool install beautysh --with setuptools || true
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate zsh configuration
        run: |
          echo "=== zsh native syntax check ==="
          zsh -n .zshrc
          echo "=== beautysh format check ==="
          if command -v beautysh >/dev/null 2>&1; then
            PYTHONWARNINGS="ignore" beautysh --check .zshrc
          else
            echo "beautysh unavailable; skipping format check"
          fi

      - name: Validate Zellij KDL configs
        run: |
          echo "=== zellij setup --check ==="
          zellij --config-dir "$GITHUB_WORKSPACE/.config/zellij" setup --check

      - name: Validate LaunchAgent plist template (plutil)
        run: |
          while IFS= read -r template; do
            echo "Checking: $template"
            sed "s|{{HOME}}|$HOME|g; s|{{env.HOME}}|$HOME|g" \
              "$template" > /tmp/ci-test.plist
            plutil -lint /tmp/ci-test.plist
            rm -f /tmp/ci-test.plist
          done < <(git ls-files 'Library/LaunchAgents/*plist*')

      - name: Bootstrap script checks
        run: |
          echo "=== bootstrap syntax ==="
          bash -n .config/yadm/bootstrap
          echo "=== bootstrap test suite (mocked, no real installs) ==="
          HOME="$GITHUB_WORKSPACE" bash test-bootstrap.sh

      - name: Static-check maintenance scripts (never executed in CI)
        run: |
          # The old pipeline 'source'd daily-maintenance.sh here, which ran
          # real brew commands on the runner. Static checks only now.
          for s in daily-maintenance.sh daily-maintenance-control.sh \
                   install-daily-maintenance.sh uninstall-daily-maintenance.sh; do
            echo "bash -n $s"
            bash -n "$s"
          done
          echo "=== regression guard: required functions exist ==="
          grep -qE '^run_command\(\)' daily-maintenance.sh
          grep -qE '^run_with_timeout\(\)' daily-maintenance.sh

      - name: Run dotfiles test suite
        run: |
          export HOME="$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          export PATH="$HOME/.local/bin:/opt/homebrew/bin:$PATH"
          bash test-dotfiles.sh

  summary:
    name: CI Summary
    needs: [lint-all, documentation, security-scan, macos-integration]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Pipeline Summary"
          echo "All validation checks completed."
          echo "Check individual job results above for details."
