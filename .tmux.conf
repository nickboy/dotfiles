set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Undercurl support (colored wavy underlines for Neovim diagnostics)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# OSC52 clipboard passthrough
set -g set-clipboard on

# DCS passthrough for image protocols and shell integration
set -g allow-passthrough all

# Pass modifier keys (Shift+Enter, etc.) to applications inside tmux
set -g extended-keys on
set -as terminal-features ',xterm-ghostty:extkeys'

# Tmux 3.6: scrollbars visible only in copy-mode
set -g pane-scrollbars modal

# Allow Ghostty transparency to pass through tmux panes
set -g window-style "bg=default"
set -g window-active-style "bg=default"


unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"


set -g prefix C-a

bind C-a send-prefix

unbind %
bind \\ split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# New windows also use current path
bind c new-window -c "#{pane_current_path}"

set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable resize (hold prefix, tap H/J/K/L repeatedly)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window swapping
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1


bind "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

set -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

# Catppuccin theme configuration
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_background "none"
set -g status-left-length 30
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

set -g @plugin 'tmux-plugins/tmux-yank'

# tmux-thumbs: prefix+F to highlight URLs/hashes/paths for keyboard copy
# (no mouse selection required; great for Claude Code output)
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key F
set -g @thumbs-command 'tmux set-buffer -w -- {}'
set -g @thumbs-upcase-command 'tmux set-buffer -w -- {} && open {}'

# Which-key popup: press prefix+Space to see available shortcuts
set -g @plugin 'Nucc/tmux-which-key'
set -g @which-key-trigger '?'
set -g @which-key-popup-bg 'default'
set -g @which-key-popup-fg '#6c7086'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Toggle outer/inner tmux for nested sessions
# F12 disables outer tmux prefix, all keys pass to inner tmux
# F12 again re-enables outer tmux
# Status bar color changes to indicate which tmux is active
bind -T root F12 \
    set prefix None \;\
    set key-table off \;\
    set status-style "fg=colour245,bg=colour238" \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    refresh-client -S

bind -T off F12 \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    refresh-client -S

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Override Catppuccin theme popup colors for Ghostty transparency
set -g popup-style "bg=default"
set -g popup-border-style "fg=#6c7086"
